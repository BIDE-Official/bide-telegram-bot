name: Build and Push

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker tag
        id: meta
        run: |
          REPO="${{ github.repository }}"
          BASE="ghcr.io/${REPO,,}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tags=${BASE}:stable" >> $GITHUB_OUTPUT
          else
            echo "tags=${BASE}:testing" >> $GITHUB_OUTPUT
          fi

      - name: Prepare build date
        id: prep
        run: echo "build_date=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: BUILD_DATE=${{ steps.prep.outputs.build_date }}
